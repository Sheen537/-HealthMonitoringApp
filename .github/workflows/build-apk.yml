name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # Lets you trigger manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required for modern Android Gradle Plugin)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Inject google-services.json from GitHub Secret
      #    ⚠ You MUST add GOOGLE_SERVICES_JSON secret (see instructions)
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # 4. Cache Gradle to speed up future builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Make Gradle wrapper executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload APK so you can download it from the Actions tab
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthMonitoringApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
